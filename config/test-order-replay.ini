# Order performance replay test — replay from original input
[input]
csv_dir = D:/FIU/input
target_date = 20260525
poll_interval_ms = 10
idle_poll_interval_ms = 10
buffer_poll_interval_ms = 10
chunk_size_bytes = 65536
order_chunk_size_bytes = 524288
file_encoding = utf-8

[output]
output_dir = D:/FIU/test/replay_output
format = csv
enable_kline = false
enable_full_snapshot = true
enable_full_kline = false
enable_order = true

[aggregation]
first_seen_volume_base = start_totalvol

[timezone]
exchange_tz = Asia/Tokyo
local_tz = Asia/Shanghai

[session]
morning_open = 0900
morning_close = 1130
afternoon_open = 1230
afternoon_close = 1500
pre_market_start = 0800
post_market_end = 1530

[recovery]
checkpoint_file = D:/FIU/test/checkpoint_replay.json
output_delay_sec = 5
code_refresh_sec = 1
data_flush_delay_minutes = 1
enable_time_fallback = false
stall_flush_sec = 30
enable_tickfile_commit_marker = true
# Maximum late order records per minute before discarding (default: 1000000)
max_late_order_records_per_minute = 1000000

[logging]
error_log_dir = D:/FIU/test/errors_replay
max_file_size_mb = 100
max_backup_count = 5
log_level = INFO
