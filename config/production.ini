# FIU Minute Bar Generator — 生产环境配置
# 部署路径: /home/rpeng/fiu_minute_bar/
# 数据目录: /home/rpeng/fiu_minute_bar/{output,checkpoint,logs}
# 输入目录: /home/rpeng/FIU/log (FIU 接收服务写入)
#
# 启动: ./start.sh
# 停止: ./stop.sh
# 重启: ./restart.sh

[input]
csv_dir = /home/rpeng/FIU/log
poll_interval_ms = 200
idle_poll_interval_ms = 5000
buffer_poll_interval_ms = 1000
chunk_size_bytes = 65536
order_chunk_size_bytes = 524288
file_encoding = utf-8
; Rust acceleration for order CSV parsing — needed for peak throughput (per E2E).
; If true and Rust extension not installed → fail-fast at startup.
; Recommended: also set order_chunk_size_bytes = 524288 when enabled (reduces GIL re-acquire points).
enable_order_accel = true
; Full Rust pipeline — fine-grained switches (all on for prod).
enable_rust_order_full_batch = true
enable_rust_snapshot_batch = true
enable_rust_tickfile = true

[output]
output_dir = /home/rpeng/fiu_minute_bar/output
format = csv
enable_kline = false
enable_full_snapshot = true
enable_full_kline = false
enable_order = true
; tickfile (per-day append) requires enable_order=true.
enable_tickfile = true

[aggregation]
first_seen_volume_base = start_totalvol

[timezone]
exchange_tz = Asia/Tokyo
local_tz = Asia/Shanghai

[session]
morning_open = 0900
morning_close = 1130
afternoon_open = 1230
afternoon_close = 1500
pre_market_start = 0800
post_market_end = 1530

[recovery]
checkpoint_file = /home/rpeng/fiu_minute_bar/checkpoint/checkpoint.json
output_delay_sec = 5
code_refresh_sec = 30
data_flush_delay_minutes = 1
enable_time_fallback = false
stall_flush_sec = 300
enable_tickfile_commit_marker = true
# Maximum late order records per minute before discarding.
# Applies to ALL modes (live, replay, tickfile enabled or disabled).
# Default: 1000000 (1M). Each record uses ~300-400 bytes of Python memory.
# At 1M records this is ~400 MB per minute. Multiple minutes accumulating
# simultaneously could reach 2-3 GB total. Monitor memory if adjusting.
# Production: rarely exceeds 1000 late records per minute.
# 100x test: busiest minute has ~750K records.
max_late_order_records_per_minute = 1000000

[logging]
error_log_dir = /home/rpeng/fiu_minute_bar/logs
max_file_size_mb = 100
max_backup_count = 5
log_level = INFO
