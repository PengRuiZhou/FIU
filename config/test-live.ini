# FIU Minute Bar Generator — Live 测试配置
# 与 data_simulator 配合使用，测试 live 模式端到端流程
#
# 用法:
#   终端 1: PYTHONPATH=src python main.py --config config/test-live.ini
#   终端 2: PYTHONPATH=src python -m data_simulator --speed 100 --file-types order,snapshot,code

[input]
csv_dir = D:/FIU/test/output
target_date = 20260525
poll_interval_ms = 200
idle_poll_interval_ms = 5000
buffer_poll_interval_ms = 1000
chunk_size_bytes = 65536
file_encoding = utf-8

[output]
output_dir = D:/FIU/test/live_output
format = csv
enable_kline = false
enable_full_snapshot = true
enable_full_kline = false
enable_order = true

[aggregation]
first_seen_volume_base = start_totalvol

[timezone]
exchange_tz = Asia/Tokyo
local_tz = Asia/Shanghai

[session]
morning_open = 0900
morning_close = 1130
afternoon_open = 1230
afternoon_close = 1500
pre_market_start = 0800
post_market_end = 1530

[recovery]
checkpoint_file = D:/FIU/test/checkpoint.json
output_delay_sec = 5
code_refresh_sec = 30
data_flush_delay_minutes = 1
enable_time_fallback = true
stall_flush_sec = 300
# Maximum late order records per minute before discarding (default: 1000000)
max_late_order_records_per_minute = 1000000

[logging]
error_log_dir = D:/FIU/test/errors
max_file_size_mb = 100
max_backup_count = 5
log_level = INFO
