# FIU Minute Bar Generator — 测试配置（live + replay 通用，旧 test-*.ini 的超集）
#
# live:   终端1  PYTHONPATH=src python main.py --config config/test.ini
#         终端2  PYTHONPATH=src python -m data_simulator --speed 100 --file-types order,snapshot,code --date 20260528
# replay: PYTHONPATH=src python main.py --config config/test.ini --replay 20260528
#         (replay 时把 [input] csv_dir 改为 D:/FIU/input 指向源数据)
#
# 全 Rust 管线 + tickfile + commit-marker 开启；data-driven flush（无真实时钟等待）。
# 注意：configparser 不支持行内注释，所有注释独占一行。

[input]
# live: simulator 喂料目录; replay: 改 D:/FIU/input 指向源数据
csv_dir = D:/FIU/test/output
target_date = 20260528
poll_interval_ms = 10
idle_poll_interval_ms = 10
buffer_poll_interval_ms = 10
chunk_size_bytes = 65536
order_chunk_size_bytes = 524288
file_encoding = utf-8
# Rust 加速（生产建议全开）
enable_order_accel = true
enable_rust_order_full_batch = true
enable_rust_snapshot_batch = true
enable_rust_tickfile = true

[output]
output_dir = D:/FIU/test/run_output
format = csv
# tickfile 需 enable_order=true
enable_order = true
enable_tickfile = true
enable_kline = true
enable_full_snapshot = true
enable_full_kline = false

[aggregation]
first_seen_volume_base = start_totalvol

[timezone]
exchange_tz = Asia/Tokyo
local_tz = Asia/Shanghai

[session]
morning_open = 0900
morning_close = 1130
afternoon_open = 1230
afternoon_close = 1500
pre_market_start = 0800
post_market_end = 1530

[recovery]
checkpoint_file = D:/FIU/test/checkpoint.json
# 测试用 0 = 纯数据 watermark 驱动（最快，无真实时钟等待）
output_delay_sec = 0
code_refresh_sec = 1
data_flush_delay_minutes = 0
enable_time_fallback = false
stall_flush_sec = 30
# tickfile sidecar commit + truncate recovery
enable_tickfile_commit_marker = true
max_late_order_records_per_minute = 1000000

[logging]
error_log_dir = D:/FIU/test/errors
max_file_size_mb = 100
max_backup_count = 5
log_level = INFO
# 开启则额外输出 errors/<date>_machine.jsonl（JSON，喂 jq 监控）
# structured = true
